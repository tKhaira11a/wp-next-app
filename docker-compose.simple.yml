version: '3.8'

# ============================================
# WordPress + Next.js Headless Stack
# Alternative mit Init-Container Pattern
# ============================================

services:
  # ============================================
  # MariaDB Database
  # ============================================
  mariadb:
    image: mariadb:lts
    container_name: wp-next-mariadb
    restart: unless-stopped
    ports:
      - '${DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-wordpress}
      MYSQL_USER: ${DB_USER:-wordpress}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - wp-next-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # WordPress (Headless CMS)
  # ============================================
  wordpress:
    image: wordpress:latest
    container_name: wp-next-wordpress
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - '${WP_PORT:-8888}:80'
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
    volumes:
      - wordpress_data:/var/www/html
      # Mount custom plugins - Ordnernamen müssen mit den Original-Verzeichnissen übereinstimmen
      - ./nextpress_gb_element_plugin:/var/www/html/wp-content/plugins/nextpress_gb_element_plugin:ro
      - ./nextpress_contact_form_plugin:/var/www/html/wp-content/plugins/nextpress_contact_form_plugin:ro
      - ./wp-graphql-jwt-authentication-develop:/var/www/html/wp-content/plugins/wp-graphql-jwt-authentication:ro
      # Mount headless theme
      - ./headless:/var/www/html/wp-content/themes/headless:ro
    networks:
      - wp-next-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/wp-admin/install.php"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================
  # WordPress Setup Container
  # Runs once to configure WordPress
  # ============================================
  wordpress-init:
    image: wordpress:cli
    container_name: wp-next-init
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: ${DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: ${DB_NAME:-wordpress}
      # Setup Configuration
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-admin123}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@localhost}
      WP_SITE_TITLE: ${WP_SITE_TITLE:-Headless WordPress}
      WP_SITE_URL: ${WP_SITE_URL:-http://localhost:8888}
      HEADLESS_SECRET: ${HEADLESS_SECRET:-}
      HEADLESS_URL: ${HEADLESS_URL:-http://localhost:3000}
      GRAPHQL_JWT_SECRET: ${GRAPHQL_JWT_SECRET:-}
      APP_USER_NAME: ${APP_USER_NAME:-NextApp-User}
      APP_USER_EMAIL: ${APP_USER_EMAIL:-nextapp@localhost}
    volumes:
      - wordpress_data:/var/www/html
      - ./scripts/wp-cli-setup.sh:/setup.sh:ro
      - ./shared:/shared
    networks:
      - wp-next-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for WordPress to be fully ready..."
        sleep 10
        
        # Check if WordPress is installed
        if ! wp core is-installed --path=/var/www/html 2>/dev/null; then
          echo "Installing WordPress..."
          wp core install \
            --path=/var/www/html \
            --url="$${WP_SITE_URL}" \
            --title="$${WP_SITE_TITLE}" \
            --admin_user="$${WP_ADMIN_USER}" \
            --admin_password="$${WP_ADMIN_PASSWORD}" \
            --admin_email="$${WP_ADMIN_EMAIL}" \
            --skip-email
        fi
        
        echo "Installing plugins from WordPress.org..."
        wp plugin install wp-graphql --activate --path=/var/www/html || true
        wp plugin install wp-graphql-ide --activate --path=/var/www/html || true
        wp plugin install add-wpgraphql-seo --activate --path=/var/www/html || true
        wp plugin install redirection --activate --path=/var/www/html || true
        wp plugin install wordpress-seo --activate --path=/var/www/html || true
        
        echo "Activating custom plugins..."
        wp plugin activate nextpress_gb_element_plugin --path=/var/www/html || true
        wp plugin activate nextpress_contact_form_plugin --path=/var/www/html || true
        wp plugin activate wp-graphql-jwt-authentication --path=/var/www/html || true
        
        echo "Activating headless theme..."
        wp theme activate headless --path=/var/www/html || true
        
        echo "Configuring permalinks..."
        wp rewrite structure '/%postname%/' --hard --path=/var/www/html
        
        echo "Creating App User..."
        APP_USER_ID=$$(wp user get "$${APP_USER_NAME}" --field=ID --path=/var/www/html 2>/dev/null || echo "")
        if [ -z "$$APP_USER_ID" ]; then
          APP_USER_ID=$$(wp user create "$${APP_USER_NAME}" "$${APP_USER_EMAIL}" --role=administrator --porcelain --path=/var/www/html)
        fi
        
        echo "Creating Application Password..."
        APP_PASS=$$(wp user application-password create $$APP_USER_ID "NextJS-App" --porcelain --path=/var/www/html 2>/dev/null || echo "generated-pass")
        
        echo "Creating 404 page..."
        PAGE_ID=$$(wp post list --post_type=page --name="404-not-found" --field=ID --path=/var/www/html 2>/dev/null || echo "")
        if [ -z "$$PAGE_ID" ]; then
          PAGE_ID=$$(wp post create --post_type=page --post_title="404 - Not Found" --post_name="404-not-found" --post_status=publish --porcelain --path=/var/www/html)
        fi
        
        # Generate secrets if not provided
        HEADLESS_SECRET_FINAL=$${HEADLESS_SECRET:-$$(openssl rand -hex 20 2>/dev/null || echo "default-secret")}
        JWT_SECRET_FINAL=$${GRAPHQL_JWT_SECRET:-$$(openssl rand -base64 32 2>/dev/null || echo "default-jwt-secret")}
        
        echo "Saving credentials..."
        mkdir -p /shared
        cat > /shared/.env.nextjs << EOF
        NEXT_PUBLIC_BASE_URL=$${HEADLESS_URL}
        NEXT_PUBLIC_WORDPRESS_API_URL=$${WP_SITE_URL}
        NEXT_PUBLIC_WORDPRESS_API_HOSTNAME=$$(echo $${WP_SITE_URL} | sed -e 's|^[^/]*//||' -e 's|/.*$$||' -e 's|:.*$$||')
        HEADLESS_SECRET=$$HEADLESS_SECRET_FINAL
        WP_USER=$${APP_USER_NAME}
        WP_APP_PASS=$$APP_PASS
        NOT_FOUND_ID=$$PAGE_ID
        EOF
        
        echo "Adding headless config to wp-config.php..."
        wp config set HEADLESS_SECRET "$$HEADLESS_SECRET_FINAL" --raw --type=constant --path=/var/www/html || true
        wp config set HEADLESS_URL "$${HEADLESS_URL}" --type=constant --path=/var/www/html || true
        wp config set GRAPHQL_JWT_AUTH_SECRET_KEY "$$JWT_SECRET_FINAL" --type=constant --path=/var/www/html || true
        wp config set GRAPHQL_JWT_AUTH_CORS_ENABLE true --raw --type=constant --path=/var/www/html || true
        
        echo ""
        echo "=========================================="
        echo "WordPress Setup Complete!"
        echo "=========================================="
        echo ""
        cat /shared/.env.nextjs
        echo ""
    restart: "no"

  # ============================================
  # Next.js Application
  # ============================================
  nextjs:
    build:
      context: ./wp-next-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
        - NEXT_PUBLIC_WORDPRESS_API_URL=${WP_SITE_URL:-http://localhost:8888}
        - NEXT_PUBLIC_WORDPRESS_API_HOSTNAME=${WP_HOSTNAME:-localhost}
        - HEADLESS_SECRET=${HEADLESS_SECRET}
        - WP_USER=${APP_USER_NAME:-NextApp-User}
        - WP_APP_PASS=${WP_APP_PASS:-placeholder}
        - NOT_FOUND_ID=${NOT_FOUND_ID:-0}
        - RESEND_API_KEY=${RESEND_API_KEY}
    container_name: wp-next-nextjs
    restart: unless-stopped
    depends_on:
      wordpress-init:
        condition: service_completed_successfully
    ports:
      - '${NEXTJS_PORT:-3000}:3000'
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
    env_file:
      - ./shared/.env.nextjs
    networks:
      - wp-next-network
    profiles:
      - with-nextjs

volumes:
  mariadb_data:
    driver: local
  wordpress_data:
    driver: local

networks:
  wp-next-network:
    driver: bridge
