services:
  mysql:
    image: 'mariadb:lts'
    ports:
      - '${WP_ENV_MYSQL_PORT:-}:3306'
    environment:
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
    volumes:
      - 'mysql:/var/lib/mysql'
  wordpress:
    depends_on:
      - mysql
    build:
      context: .
      dockerfile: WordPress.Dockerfile
      args: &ref_0
        HOST_USERNAME: khairalla-code
        HOST_UID: '1001'
        HOST_GID: '1001'
    ports:
      - '${WP_ENV_PORT:-8888}:80'
      - '3000:3000'
    environment:
      APACHE_RUN_USER: '#1001'
      APACHE_RUN_GROUP: '#1001'
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress
      WP_TESTS_DIR: /wordpress-phpunit
    volumes: &ref_1
      - >-
        /home/khairalla-code/.wp-env/33679512d1dd8454d44878425b22f751/WordPress:/var/www/html
      - >-
        /home/khairalla-code/.wp-env/33679512d1dd8454d44878425b22f751/WordPress-PHPUnit/tests/phpunit:/wordpress-phpunit
      - 'user-home:/home/khairalla-code'
      - >-
        /home/khairalla-code/Project-Working-Dir/wp-env/nextpress_gb_components:/var/www/html/wp-content/plugins/nextpress_gb_components
    extra_hosts:
      - 'host.docker.internal:host-gateway'
volumes:
  mysql: {}
  user-home: {}
